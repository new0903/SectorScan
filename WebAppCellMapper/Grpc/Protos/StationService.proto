syntax = "proto3";

option csharp_namespace = "WebAppCellMapper";



enum NetworkStandardGRPC {
    Gsm=0;
    Wcdma=1;
    Lte=2;
    Nr=3;
}

message Location{
    double latS=1;
    double latE=2;
    double lonS=3;
    double lonE=4;
}

/*
message RequestParams {
    NetworkStandardGRPC network=1;
    string operatorCode = 2;
    Location coordinates=3;
    bool useProxy=4;
}
*/


message RequestParamsForOperator {
    NetworkStandardGRPC network=1;
    string operatorCode = 2;
}

message RequestParamsForArea {
    NetworkStandardGRPC network=1;
    string operatorCode = 2;
    Location coordinates=3;
    double step=4;
}


message RequestParamsForLocation {
    NetworkStandardGRPC network=1;
    string operatorCode = 2;
    Location coordinates=3;
    bool useProxy=4;
}



/*
    public record QueryResult(
        string OperatorCode,
        NetworkStandard Network,
        int CountAdded,
        int CountSectors,
        string Message) 
    {
        public DateTime Timestamp { get; init; } = DateTime.UtcNow;
    }
*/
message RequestResponse {
    string operatorCode = 1;
    NetworkStandardGRPC network=2;
    int32 countAdded=3;
    int32 scannedSector=4;
    int32 countSectors=5;
    string message = 6;
    string timestamp = 7;
    bool isDone = 8;
}

message Empty{}
service StationServiceGrpc {
  rpc SyncStationsAllStream(Empty) returns (stream RequestResponse);
  rpc SearchByOperatorStream(RequestParamsForOperator) returns (stream RequestResponse);
  rpc ScanAreaStream(RequestParamsForArea) returns (stream RequestResponse);
  rpc SearchAtLocationStream(RequestParamsForLocation) returns (RequestResponse);
}


